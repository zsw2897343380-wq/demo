name: Harness

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to auto-implement' 
        required: true
        type: string
      base_branch:
        description: 'Base branch to merge into' 
        required: false
        default: 'develop'
        type: string
  issues:
    types: [opened, edited]
  pull_request:
    types: [opened, synchronize, edited]

concurrency:
  group: harness-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  issue-to-branch:
    if: github.event_name == 'issues' || github.event_name == 'workflow_dispatch'
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip requests

      - name: Run Issue-to-Branch Automation
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        run: |
          ISSUE_NUMBER="${{ github.event.number || github.event.inputs.issue_number }}"
          BASE_BRANCH="${{ github.event.inputs.base_branch || 'develop' }}"
          python3 issue_to_branch.py --issue-number "$ISSUE_NUMBER" --repo "${{ github.repository }}" --base "$BASE_BRANCH" --token "$GITHUB_TOKEN" --opencode-key "$OPENCODE_API_KEY"

  review-and-merge:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Setup GitHub CLI
        uses: cli/cli-action@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect package manager
        id: detect
        run: |
          if [ -f package.json ]; then echo "name=node"; else if [ -f yarn.lock ]; then echo "name=node"; elif [ -f bun.lock ]; then echo "name=bun"; else echo "name=none"; fi; fi
      - name: Install dependencies
        if: steps.detect.outputs.name != 'none'
        run: |
          if [ -f package.json ]; then npm ci; fi
          if [ -f bun.lock ]; then bun install; fi
          if [ -f yarn.lock ]; then yarn install; fi
      - name: Run linters and tests
        run: |
          TIMEDOUT=0
          if [ -f package.json ]; then
            npm run lint || TIMEDOUT=$?; 
            npm run test -- --ci || TIMEDOUT=$((TIMEDOUT + 0));
          fi
          if [ $TIMEDOUT -ne 0 ]; then echo "Lint/Test failed"; exit 1; fi
      - name: Auto-merge if pass
        if: ${{ success() }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} --merge --repo "${{ github.repository }}" || true
