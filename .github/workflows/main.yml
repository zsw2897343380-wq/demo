name: Harness

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to auto-implement' 
        required: true
        type: string
      base_branch:
        description: 'Base branch to merge into' 
        required: false
        default: 'main'
        type: string
      strategy:
        description: 'Code generation strategy'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - deepseek
          - openai
          - anthropic
          - opencode
          - template
  issues:
    types: [opened, edited]
  pull_request:
    types: [opened, synchronize, edited]

concurrency:
  group: harness-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  issue-to-branch:
    if: github.event_name == 'issues' || github.event_name == 'workflow_dispatch'
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for proper branch creation

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip requests

      - name: Run Issue-to-Branch Automation
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # AI API Keys (optional - for AI-powered code generation)
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Legacy key (kept for compatibility)
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ISSUE_NUMBER="${{ github.event.inputs.issue_number }}"
            BASE_BRANCH="${{ github.event.inputs.base_branch || 'main' }}"
            STRATEGY="${{ github.event.inputs.strategy || 'auto' }}"
          else
            ISSUE_NUMBER="${{ github.event.issue.number }}"
            BASE_BRANCH="main"
            STRATEGY="auto"
          fi
          
          echo "=========================================="
          echo "Processing Issue #$ISSUE_NUMBER"
          echo "Base branch: $BASE_BRANCH"
          echo "Strategy: $STRATEGY"
          echo "=========================================="
          
          # Check which API keys are available (without exposing values)
          if [ -n "$DEEPSEEK_API_KEY" ]; then
            echo "✅ DEEPSEEK_API_KEY is configured"
          else
            echo "ℹ️  DEEPSEEK_API_KEY not set"
          fi
          
          if [ -n "$OPENAI_API_KEY" ]; then
            echo "✅ OPENAI_API_KEY is configured"
          else
            echo "ℹ️  OPENAI_API_KEY not set"
          fi
          
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            echo "✅ ANTHROPIC_API_KEY is configured"
          else
            echo "ℹ️  ANTHROPIC_API_KEY not set"
          fi
          
          python3 run_issue_to_branch.py \
            --issue-number "$ISSUE_NUMBER" \
            --repo "${{ github.repository }}" \
            --base "$BASE_BRANCH" \
            --token "$GITHUB_TOKEN" \
            --strategy "$STRATEGY"

  review-and-merge:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Setup GitHub CLI
        uses: cli/cli-action@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect package manager
        id: detect
        run: |
          if [ -f package.json ]; then
            echo "name=node" >> "$GITHUB_OUTPUT"
          elif [ -f yarn.lock ]; then
            echo "name=node" >> "$GITHUB_OUTPUT"
          elif [ -f bun.lock ]; then
            echo "name=bun" >> "$GITHUB_OUTPUT"
          else
            echo "name=none" >> "$GITHUB_OUTPUT"
          fi
      - name: Install dependencies
        if: steps.detect.outputs.name != 'none'
        run: |
          if [ -f package.json ]; then npm ci; fi
          if [ -f bun.lock ]; then bun install; fi
          if [ -f yarn.lock ]; then yarn install; fi
      - name: Run linters and tests
        run: |
          if [ -f package.json ]; then
            npm run lint || { echo "Lint failed"; exit 1; }
            npm run test -- --ci || { echo "Tests failed"; exit 1; }
          fi
      - name: Auto-merge if pass
        if: ${{ success() }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} --merge --repo "${{ github.repository }}" || true
